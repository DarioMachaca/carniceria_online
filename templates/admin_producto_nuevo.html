{% extends "base.html" %}

{% block title %}
Nuevo producto
{% endblock %}

{% block content %}

<section class="admin-header">

    <h2>
        ➕ Nuevo producto
    </h2>

</section>

<form
    method="POST"
    action="/admin/producto/guardar"
    enctype="multipart/form-data"
    class="admin-card admin-form"
>

    <!-- =========================
         CATEGORÍA
    ========================= -->

    <label>Categoría</label>

    <select name="id_categoria" required>

        {% for categoria in categorias %}

            <option value="{{ categoria.id_categoria }}">
                {{ categoria.nombre }}
            </option>

        {% endfor %}

    </select>

    <!-- =========================
         DATOS PRINCIPALES
    ========================= -->

    <label>Nombre</label>

    <input
        type="text"
        name="nombre"
        required
        placeholder="Ej: Costilla premium"
    >

    <label>Descripción</label>

    <textarea
        name="descripcion"
        placeholder="Descripción del producto..."
    ></textarea>

    <label>Unidad de medida</label>

    <select name="unidad_medida">

        <option value="kg">
            Kilogramo (kg)
        </option>

        <option value="unidad">
            Unidad
        </option>

        <option value="docena">
            Docena
        </option>

    </select>

    <label>Precio</label>

    <input
        type="number"
        step="0.01"
        name="precio"
        required
        placeholder="0.00"
    >

    <!-- =========================
         IMAGEN
    ========================= -->

    <label>Imagen</label>

    <input
        type="file"
        name="imagen"
        accept="image/*"
    >

    <small>

        Recomendado: imagen cuadrada de 800x800 px.

    </small>

    <!-- =========================
         CONFIGURACIÓN
    ========================= -->

    <label>Orden visual</label>

    <input
        type="number"
        name="orden_visual"
        value="1"
    >

    <label>
        <input
            type="checkbox"
            name="destacado"
        >
        ⭐ Producto destacado
    </label>

    <label>
        <input
            type="checkbox"
            name="sin_stock"
        >
        Sin stock
    </label>

    <label>
        <input
            type="checkbox"
            name="activo"
            checked
        >
        Activo
    </label>

    <!-- =========================
         BOTÓN
    ========================= -->

    <br>

    <button type="submit" class="btn-admin">

        💾 Guardar producto

    </button>

</form>

{% endblock %}
