{% extends "base.html" %}

{% block title %}
Nueva Promoción
{% endblock %}

{% block content %}

<section class="admin-header">
    <h2>➕ Nueva Promoción</h2>
</section>

<form
    method="POST"
    action="/admin/promociones/guardar"
    enctype="multipart/form-data"
    class="admin-card admin-form"
>

    <label>Título</label>
    <input type="text" name="titulo" required>

    <label>Descripción</label>
    <textarea name="descripcion"></textarea>

    <label>Imagen</label>
    <input type="file" name="imagen" accept="image/*">

    <div class="admin-info-box">

        <strong>Recomendación:</strong>

        Utilice imágenes horizontales de 1600 x 600 px para que se vean correctamente en computadoras, tablets y celulares.

    </div>

    <label>Fecha inicio</label>
    <input type="datetime-local" name="fecha_inicio">

    <label>Fecha fin</label>
    <input type="datetime-local" name="fecha_fin">

    <label>Tipo de temporizador</label>

    <select name="tipo_temporizador">

        <option value="ninguno">
            No mostrar
        </option>

        <option value="fecha">
            Mostrar fecha fin
        </option>

        <option value="hora">
            Mostrar cuenta regresiva
        </option>

    </select>

    <label>Activo</label>
    <select name="activo">
        <option value="1">Sí</option>
        <option value="0">No</option>
    </select>

    <label>Orden visualización</label>
    <input type="number" name="orden_visualizacion" value="1">

    <br>

    <button type="submit" class="btn-admin">
        💾 Guardar promoción
    </button>

</form>

{% endblock %}
